# Aegis target manifest. Tells the orchestrator which file is editable, which
# files are locked, which harness to verify, and which tests gate behaviour.
# Read by the loop at run start; never written.

[target]
name = "transfer"
# The single file the loop is allowed to rewrite.
editable = "src/lib.rs"
# Files the loop must read but never write.
locked = ["src/harness.rs", "tests/integration.rs"]

[verifier]
kind = "kani"
# Harness function name — passed to `cargo kani --harness`.
harness = "check_transfer_never_panics"
# Locked file whose contents are sent to the repair loop as verifier context.
context = "src/harness.rs"

[behaviour]
# Command used for the behaviour gate. Run from the workdir copy of the crate.
test_command = "cargo test --tests"
# Locked file whose contents are sent to the repair loop as behaviour context.
context = "tests/integration.rs"
